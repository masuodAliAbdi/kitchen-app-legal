<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Helix Kitchens…</title>
<style>
  :root {
    --primary: #C75D3B;
    --background: #FBF6EE;
    --surface: #FFFFFF;
    --border: #E6DCC8;
    --text: #3A2E27;
    --text-muted: #8A7B6C;
  }
  body {
    margin: 0;
    background: var(--background);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 360px;
    text-align: center;
  }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { color: var(--text-muted); font-size: 14px; line-height: 1.5; }
  a.button {
    display: inline-block;
    margin-top: 16px;
    background: var(--primary);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 12px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Opening Helix Kitchens…</h1>
    <p>If nothing happens in a few seconds, tap the button below.</p>
    <a id="open-link" class="button" href="#">Open in app</a>
  </div>

  <script>
    // Supabase Auth delivers tokens in the URL hash fragment (e.g. #access_token=...&type=invite
    // or &type=recovery). Email apps and webmail clients routinely strip or refuse to open
    // custom URL schemes (helixkitchens://) directly, so this page exists purely as a real
    // https:// link that a browser will open — and from inside an actual browser, handing off
    // to the app's custom scheme works reliably. The hash is forwarded unchanged.
    var hash = window.location.hash; // includes the leading '#'
    var appUrl = 'helixkitchens://reset-password' + hash;

    document.getElementById('open-link').href = appUrl;

    // Attempt the handoff automatically; the visible button is the fallback if this is
    // blocked (some mobile browsers require a user gesture for custom-scheme navigation).
    window.location.replace(appUrl);
  </script>
</body>
</html>
